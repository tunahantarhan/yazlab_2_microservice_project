# özel local ağ
networks:
  yazlab_net:
    driver: bridge

services:
  ticket_db:
    image: mongo:latest
    container_name: ticket_db
    ports:
      - "27017:27017"

  user_db:
    image: mongo:latest
    container_name: user_db
    ports:
      - "27018:27017"

  ticket_service:
    build: ./ticket_service
    container_name: ticket_service
    ports:
      - "8000:8000"
    depends_on:
      - ticket_db

  user_service:
    build: ./user_service
    container_name: user_service
    ports:
      - "8001:8000"
    depends_on:
      - user_db

  auth_service:
    build: ./auth_service
    container_name: auth_service
    ports:
      - "8003:8000"

  dispatcher:
    build: ./dispatcher
    container_name: dispatcher
    ports:
      - "8002:8000"
    depends_on:
      - ticket_service
      - user_service
      - auth_service

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - dispatcher

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
